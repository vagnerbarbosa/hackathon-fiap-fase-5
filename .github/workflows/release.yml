name: Release

on:
  push:
    tags:
      - "v*"  # e.g. v0.1.0, v1.2.3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # never cancel a release in progress

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # e.g. org/hackathon-fiap-fase-5

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build and push Docker image to GHCR
  # ---------------------------------------------------------------------------
  docker-publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write  # required to push to GHCR

    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for release notes

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optionally also push to DockerHub if credentials are configured.
      # We read the secret into an env var first to avoid GitHub Actions warnings
      # when comparing a secret directly in an `if:` expression.
      - name: Log in to DockerHub (optional)
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        if: ${{ env.DOCKERHUB_USER != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve DockerHub image name (optional)
        id: dockerhub
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_USER" ]; then
            echo "image=docker.io/$DOCKERHUB_USER/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ steps.dockerhub.outputs.image }}
          tags: |
            # Semver tag: v1.2.3 → 1.2.3, 1.2, 1, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Always tag with the full git tag
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=FIAP STRIDE Threat Modeler
            org.opencontainers.image.description=Automated STRIDE threat modeling from architecture diagrams
            org.opencontainers.image.vendor=FIAP Grupo 27

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true   # SLSA provenance attestation
          sbom: true         # Software Bill of Materials

      - name: Print published image
        run: |
          echo "Published image tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/  → /'
          echo "Digest: ${{ steps.build-push.outputs.digest }}"

  # ---------------------------------------------------------------------------
  # Job 2: Smoke-test the published image
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test Published Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker-publish

    steps:
      - name: Checkout code (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: |
          IMAGE="${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ needs.docker-publish.outputs.image-version }}"
          echo "Pulling $IMAGE ..."
          docker pull "$IMAGE"
          # Retag as local alias used by docker-compose
          docker tag "$IMAGE" fiap-stride:release

      - name: Start dependencies
        run: |
          docker compose up -d db redis
          echo "Waiting for PostgreSQL..."
          timeout 60 bash -c 'until docker compose exec -T db pg_isready -U postgres -d fiap_stride; do sleep 2; done'

      - name: Run API with published image
        run: |
          docker run -d \
            --name fiap-api-smoke \
            --network "$(docker compose ps -q db | xargs docker inspect --format '{{range .NetworkSettings.Networks}}{{.NetworkID}}{{end}}' | head -1)" \
            -p 8001:8000 \
            -e DATABASE_URL=postgresql+asyncpg://postgres:postgres@fiap-db:5432/fiap_stride \
            -e REDIS_URL=redis://fiap-redis:6379/0 \
            -e STORAGE_PATH=/tmp/storage \
            -e API_KEY=smoke-test-key \
            -e LOG_LEVEL=WARNING \
            -e API_RATE_LIMIT=9999 \
            fiap-stride:release
          echo "Waiting for API to start..."
          sleep 15

      - name: Verify /health endpoint
        run: |
          echo "→ Probing /health..."
          MAX_RETRIES=10
          RETRY=0
          until curl -sf http://localhost:8001/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') == 'healthy', f'Unexpected status: {d}'
          print(f'  ✓ /health OK: {d}')
          " 2>/dev/null; do
            RETRY=$((RETRY+1))
            if [ "$RETRY" -ge "$MAX_RETRIES" ]; then
              echo "ERROR: /health did not return healthy after $MAX_RETRIES attempts"
              docker logs fiap-api-smoke
              exit 1
            fi
            echo "  Attempt $RETRY/$MAX_RETRIES failed, retrying in 5s..."
            sleep 5
          done

      - name: Verify /version endpoint
        run: |
          echo "→ Probing /version..."
          curl -sf http://localhost:8001/version | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'  ✓ /version OK: {d}')
          "

      - name: Print container logs on failure
        if: failure()
        run: docker logs fiap-api-smoke

      - name: Cleanup
        if: always()
        run: |
          docker stop fiap-api-smoke 2>/dev/null || true
          docker rm fiap-api-smoke 2>/dev/null || true
          docker compose down -v

  # ---------------------------------------------------------------------------
  # Job 3: Create GitHub Release with auto-generated notes
  # ---------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [docker-publish, smoke-test]

    permissions:
      contents: write  # required to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## Docker Image

            Pull the image for this release:
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.docker-publish.outputs.image-version }}
            ```

            ## Quick Start
            ```bash
            # Clone and configure
            git clone https://github.com/${{ github.repository }}.git
            cd $(basename ${{ github.repository }})
            cp .env.example .env

            # Run with Docker Compose
            docker compose up -d

            # Health check
            curl http://localhost:8001/health
            ```

            ## Image Digest
            `${{ needs.docker-publish.outputs.image-digest }}`
