components:
  user:
    threats:
      - category: "S"
        description: "Spoofing de identidade do usuario."
        justification: "Usuarios autenticam interacoes e podem ter identidade simulada."
      - category: "R"
        description: "Negacao de acoes realizadas pelo usuario."
        justification: "Acoes de usuario precisam de trilha de auditoria confiavel."
  web_server:
    threats:
      - category: "S"
        description: "Falso servidor web pode receber trafego de usuarios."
        justification: "Usuarios precisam confiar na identidade do servidor antes de enviar credenciais ou dados."
      - category: "T"
        description: "Respostas HTTP podem ser alteradas antes de chegar ao cliente."
        justification: "Conteudo servido ao cliente influencia sessoes, formularios e decisoes de seguranca."
      - category: "R"
        description: "Logs web insuficientes permitem negar eventos relevantes."
        justification: "A camada web registra requisicoes e deve sustentar auditoria de eventos."
      - category: "I"
        description: "Headers, cookies ou paginas podem expor dados sensiveis."
        justification: "Servidores web manipulam metadados e conteudo entregue diretamente a usuarios."
      - category: "D"
        description: "Servidor web pode sofrer indisponibilidade por DDoS."
        justification: "A exposicao publica torna o servidor web alvo natural de esgotamento de recursos."
      - category: "E"
        description: "Falhas no servidor web podem permitir escalacao para shell."
        justification: "Comprometimento da camada web pode abrir acesso ao ambiente de execucao."
  api:
    threats:
      - category: "S"
        description: "Spoofing de tokens ou credenciais de API."
        justification: "APIs dependem de tokens e credenciais para identificar consumidores."
      - category: "T"
        description: "Requests ou responses podem ser alterados indevidamente."
        justification: "APIs processam payloads de entrada e saida que afetam regras de negocio."
      - category: "R"
        description: "Chamadas podem ser negadas por falta de auditoria confiavel."
        justification: "Chamadas de API precisam ser rastreaveis para responsabilizacao."
      - category: "I"
        description: "Dados sensiveis podem ser expostos por endpoints da API."
        justification: "Endpoints frequentemente retornam dados de usuario, negocio ou operacao."
      - category: "D"
        description: "Recursos da API podem ser esgotados por excesso de requisicoes."
        justification: "APIs expostas podem receber alto volume de chamadas concorrentes."
      - category: "E"
        description: "Bypass de autorizacao pode causar escalacao de privilegios."
        justification: "APIs aplicam regras de autorizacao que separam perfis e permissoes."
  database:
    threats:
      - category: "T"
        description: "Registros do banco podem ser alterados sem autorizacao."
        justification: "Bancos armazenam estado critico e precisam proteger integridade de registros."
      - category: "R"
        description: "Transacoes podem ser negadas sem logs e trilhas confiaveis."
        justification: "Operacoes em dados persistentes precisam de trilha auditavel."
      - category: "I"
        description: "Dados sensiveis podem ser exfiltrados do banco."
        justification: "Bancos concentram dados persistidos, incluindo informacoes sensiveis."
      - category: "D"
        description: "Consultas abusivas podem indisponibilizar o banco."
        justification: "Consultas pesadas ou concorrentes podem esgotar conexoes e recursos."
      - category: "E"
        description: "Permissoes excessivas podem permitir escalacao no banco."
        justification: "Contas e roles de banco podem conceder acesso alem do necessario."
  queue:
    threats:
      - category: "S"
        description: "Mensagens podem ser enviadas por produtores falsificados."
        justification: "Filas dependem da identidade de produtores e consumidores autorizados."
      - category: "T"
        description: "Payloads de mensagens podem ser alterados."
        justification: "Mensagens transportam comandos ou eventos que alteram processamento posterior."
      - category: "R"
        description: "Produtores ou consumidores podem negar envio ou consumo."
        justification: "Fluxos assicronos exigem rastreabilidade de publicacao e consumo."
      - category: "I"
        description: "Mensagens na fila podem revelar dados sensiveis."
        justification: "Payloads podem conter dados de usuarios, operacoes ou integracoes."
      - category: "D"
        description: "Fila pode ser preenchida ate ficar indisponivel."
        justification: "Backlogs e limites de armazenamento podem degradar produtores e consumidores."
      - category: "E"
        description: "Acesso indevido a filas pode ampliar privilegios operacionais."
        justification: "Permissoes em filas podem permitir publicar, consumir ou apagar eventos criticos."
  cache:
    threats:
      - category: "T"
        description: "Entradas do cache podem ser envenenadas."
        justification: "Dados cacheados podem substituir respostas legitimas para varios consumidores."
      - category: "I"
        description: "Dados sensiveis mantidos em cache podem vazar."
        justification: "Caches podem reter dados sensiveis por tempo maior que o necessario."
      - category: "D"
        description: "Cache busting pode aumentar carga e causar indisponibilidade."
        justification: "Falhas no cache podem repassar carga excessiva para servicos de origem."
  external_service:
    threats:
      - category: "S"
        description: "Servico externo pode ser falsificado via DNS spoofing ou MITM."
        justification: "Integracoes dependem da identidade e do destino correto do parceiro."
      - category: "T"
        description: "Callbacks ou payloads de integracao podem ser alterados."
        justification: "Dados recebidos de terceiros influenciam processamento interno."
      - category: "R"
        description: "Integracoes podem ser negadas sem correlacao de eventos."
        justification: "Eventos entre organizacoes precisam de rastreabilidade compartilhada."
      - category: "I"
        description: "Dados podem vazar por integracao com terceiro."
        justification: "Servicos externos recebem ou retornam dados fora do dominio interno."
      - category: "D"
        description: "Indisponibilidade do parceiro pode afetar o sistema."
        justification: "Dependencias externas podem interromper jornadas internas quando falham."
  mobile_app:
    threats:
      - category: "S"
        description: "Aplicativo pode ser clonado para simular cliente legitimo."
        justification: "Clientes mobile podem ser copiados e usados para simular dispositivos confiaveis."
      - category: "T"
        description: "Binario mobile pode ser adulterado."
        justification: "O binario roda em ambiente controlado pelo usuario final."
      - category: "R"
        description: "Uso local pode ser negado sem telemetria confiavel."
        justification: "Eventos locais precisam ser correlacionados com acoes no backend."
      - category: "I"
        description: "Storage local pode expor dados sensiveis."
        justification: "Dispositivos podem armazenar tokens, preferencias e dados em repouso."
      - category: "D"
        description: "Crash loops podem impedir uso do aplicativo."
        justification: "Falhas recorrentes no cliente impedem acesso ao servico."
      - category: "E"
        description: "Jailbreak ou root pode contornar controles locais."
        justification: "Ambientes comprometidos podem ignorar protecoes aplicadas no cliente."
  container:
    threats:
      - category: "S"
        description: "Imagem de container pode ser falsificada."
        justification: "Implantacoes dependem da origem e assinatura corretas das imagens."
      - category: "T"
        description: "Imagem ou runtime do container pode ser alterado."
        justification: "Alteracoes na imagem ou runtime mudam o comportamento do servico."
      - category: "I"
        description: "Secrets em variaveis de ambiente podem vazar."
        justification: "Containers frequentemente recebem configuracoes sensiveis por ambiente."
      - category: "D"
        description: "Consumo excessivo de recursos pode derrubar o container."
        justification: "Limites insuficientes de CPU, memoria ou IO afetam disponibilidade."
      - category: "E"
        description: "Container escape pode elevar privilegios no host."
        justification: "Quebras de isolamento podem permitir acesso alem do container."
  storage:
    threats:
      - category: "T"
        description: "Arquivos armazenados podem ser alterados indevidamente."
        justification: "Storage preserva artefatos que precisam manter integridade."
      - category: "R"
        description: "Uploads podem ser negados sem auditoria adequada."
        justification: "Operacoes de upload e alteracao precisam identificar autor e momento."
      - category: "I"
        description: "Arquivos podem ser acessados sem autorizacao."
        justification: "Objetos armazenados podem conter dados sensiveis ou privados."
      - category: "D"
        description: "Storage pode ser preenchido ate ficar indisponivel."
        justification: "Capacidade esgotada bloqueia novas escritas e pode afetar leituras."
      - category: "E"
        description: "ACLs incorretas podem permitir bypass de autorizacao."
        justification: "Politicas de acesso em storage controlam leitura, escrita e administracao."

data_flows:
  threats:
    - category: "T"
      description: "Dados em transito podem ser interceptados e modificados."
      justification: "Fluxos entre componentes dependem de integridade durante o transporte."
    - category: "I"
      description: "Dados em transito podem ser interceptados por terceiros."
      justification: "Dados trafegados podem atravessar redes ou dominios com controles diferentes."
    - category: "D"
      description: "Canal de comunicacao pode sofrer flood ou indisponibilidade."
      justification: "O canal entre componentes pode ser alvo de volume abusivo ou falhas de rede."
